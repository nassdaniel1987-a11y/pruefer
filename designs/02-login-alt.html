<!DOCTYPE html>

<html class="light" lang="de"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Prüfer - Ferienversorgung Login</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#1c1b1f",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#161543",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-container": "#020026",
                        "primary-container": "#7372a5",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#dcc578",
                        "outline": "#787680",
                        "on-tertiary-fixed-variant": "#554603",
                        "on-tertiary-container": "#4c3e00",
                        "on-primary-fixed-variant": "#424271",
                        "secondary": "#5d5c71",
                        "surface-container-high": "#ebe7ec",
                        "secondary-fixed": "#e3e0f9",
                        "on-surface": "#1c1b1f",
                        "primary": "#5a598b",
                        "background": "#fcf8fd",
                        "inverse-surface": "#313034",
                        "surface-tint": "#5a598b",
                        "surface-variant": "#e5e1e6",
                        "secondary-fixed-dim": "#c6c4dd",
                        "outline-variant": "#c8c5d0",
                        "inverse-primary": "#c3c1f9",
                        "secondary-container": "#e0ddf6",
                        "inverse-on-surface": "#f3eff4",
                        "surface": "#fcf8fd",
                        "on-surface-variant": "#47464f",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#626076",
                        "primary-fixed-dim": "#c3c1f9",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#f9e191",
                        "surface-container": "#f0edf1",
                        "surface-bright": "#fcf8fd",
                        "primary-fixed": "#e2dfff",
                        "on-secondary-fixed-variant": "#464559",
                        "surface-container-low": "#f6f2f7",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#1a1a2c",
                        "surface-dim": "#dcd9dd",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#221b00",
                        "tertiary-container": "#bfaa60",
                        "surface-container-highest": "#e5e1e6",
                        "on-primary": "#ffffff",
                        "tertiary": "#6e5d1b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .architectural-gradient {
            background: linear-gradient(135deg, #fcf8fd 0%, #f6f2f7 50%, #e0ddf6 100%);
        }
        .ghost-border {
            border-bottom: 2px solid rgba(200, 197, 208, 0.15);
        }
        .ghost-border:focus-within {
            border-bottom: 2px solid #5a598b;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col architectural-gradient">
<!-- TopNavBar (Suppressed for focused login task as per Shell Visibility Rule) -->
<main class="flex-grow flex items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Decorative Watermark Element -->
<div class="absolute top-[-10%] right-[-5%] opacity-[0.03] pointer-events-none">
<span class="material-symbols-outlined text-[40rem]" data-icon="shield">shield</span>
</div>
<!-- Login Card -->
<div class="w-full max-w-md z-10">
<div class="bg-surface-container-lowest rounded-lg shadow-[0_24px_32px_rgba(28,27,31,0.06)] p-8 md:p-12">
<!-- Card Header -->
<div class="flex flex-col items-center text-center mb-10">
<div class="w-16 h-16 bg-primary-container rounded-lg flex items-center justify-center mb-6 shadow-sm">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tight text-on-surface mb-2 font-headline">Prüfer</h1>
<p class="text-on-surface-variant font-medium tracking-wide text-sm opacity-80">Ferienversorgung-Management</p>
</div>
<!-- Form -->
<form action="#" class="space-y-8" method="POST">
<!-- Username Field -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="username">
                            Benutzername
                        </label>
<div class="ghost-border transition-all duration-300">
<input class="w-full bg-surface-container-lowest border-none focus:ring-0 px-1 py-3 text-on-surface placeholder:text-outline-variant/50" id="username" name="username" placeholder="name@beispiel.de" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-end px-1">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="password">
                                Passwort
                            </label>
</div>
<div class="ghost-border transition-all duration-300 flex items-center">
<input class="w-full bg-surface-container-lowest border-none focus:ring-0 px-1 py-3 text-on-surface placeholder:text-outline-variant/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="px-2 text-on-surface-variant hover:text-primary transition-colors cursor-pointer" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="pt-4 space-y-6">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold py-4 rounded-lg shadow-[0_8px_24px_rgba(90,89,139,0.25)] hover:opacity-90 active:scale-[0.98] transition-all duration-200 font-headline" type="submit">
                            Anmelden
                        </button>
<div class="text-center">
<a class="text-sm font-medium text-primary hover:text-on-primary-container transition-colors duration-200" href="#">
                                Zugangsdaten vergessen?
                            </a>
</div>
</div>
</form>
</div>
<!-- Additional Branding/Trust Section -->
<div class="mt-12 text-center">
<div class="inline-flex items-center gap-3 px-4 py-2 bg-surface-container-low rounded-full">
<span class="material-symbols-outlined text-primary text-sm" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="text-[10px] font-bold uppercase tracking-[0.1em] text-on-secondary-container/70">Sichere Ende-zu-Ende Verschlüsselung</span>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-surface dark:bg-slate-950 w-full border-t border-outline-variant/15 flex flex-col md:flex-row justify-between items-center px-8 py-12">
<div class="mb-6 md:mb-0">
<span class="font-plus-jakarta-sans text-xs uppercase tracking-widest text-on-surface-variant opacity-60">
                © 2024 Prüfer - Ferienversorgung. Alle Rechte vorbehalten.
            </span>
</div>
<div class="flex gap-8 items-center">
<a class="font-plus-jakarta-sans text-xs uppercase tracking-widest text-on-surface-variant opacity-60 hover:text-primary transition-all cursor-pointer" href="#">Impressum</a>
<a class="font-plus-jakarta-sans text-xs uppercase tracking-widest text-on-surface-variant opacity-60 hover:text-primary transition-all cursor-pointer" href="#">Datenschutz</a>
<a class="font-plus-jakarta-sans text-xs uppercase tracking-widest text-on-surface-variant opacity-60 hover:text-primary transition-all cursor-pointer" href="#">Kontakt</a>
<a class="font-plus-jakarta-sans text-xs uppercase tracking-widest text-on-surface-variant opacity-60 hover:text-primary transition-all cursor-pointer" href="#">AGB</a>
</div>
</footer>
</body></html>
