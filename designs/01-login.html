        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-between selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Top Navigation (Shell Implementation - Suppressed per Relevance Check but TopAppBar exists for Brand) -->
<header class="bg-transparent text-indigo-600 dark:text-indigo-400 font-['Plus_Jakarta_Sans'] text-sm tracking-wide w-full top-0 left-0 flex justify-between items-center px-8 py-6 w-full max-w-7xl mx-auto">
<div class="text-2xl font-bold tracking-tight text-indigo-900 dark:text-indigo-100 flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">verified_user</span>
            Prüfer
        </div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined hover:text-indigo-800 dark:hover:text-indigo-200 transition-colors cursor-pointer" data-icon="help_outline">help_outline</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center w-full px-6 relative overflow-hidden">
<!-- Architectural Background Element -->
<div class="absolute inset-0 pointer-events-none opacity-[0.03] flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined scale-[40] text-primary" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
<!-- Login Card -->
<div class="w-full max-w-md z-10">
<div class="bg-surface-container-lowest rounded-xl p-10 md:p-12 shadow-[0_32px_64px_-16px_rgba(28,27,31,0.06)] border-b-2 border-primary-container/10">
<!-- Brand Anchor -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-primary-container/10 flex items-center justify-center rounded-xl mb-6">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
<h1 class="text-3xl font-extrabold text-indigo-900 tracking-tight mb-2">Prüfer</h1>
<p class="text-sm uppercase tracking-[0.1em] text-on-secondary-container font-semibold">Ferienversorgung-Management</p>
</div>
<!-- Form Section -->
<form class="space-y-8">
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="username">Benutzername</label>
<div class="relative group">
<input class="w-full px-1 py-4 bg-transparent border-b border-outline-variant/30 text-on-surface placeholder:text-outline/40 focus:ring-0 focus:border-primary transition-all text-base outline-none" id="username" placeholder="admin" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="password">Passwort</label>
<div class="relative group">
<input class="w-full px-1 py-4 bg-transparent border-b border-outline-variant/30 text-on-surface placeholder:text-outline/40 focus:ring-0 focus:border-primary transition-all text-base outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="pt-4">
<button class="w-full bg-primary-container text-on-primary py-4 rounded-lg font-bold tracking-wide shadow-lg shadow-primary-container/20 hover:scale-[0.98] active:scale-[0.95] transition-all flex items-center justify-center gap-2">
                            Anmelden
                            <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-10 flex flex-col gap-4 text-center">
<a class="text-xs font-semibold text-primary hover:text-indigo-800 transition-colors" href="#">Zugangsdaten vergessen?</a>
</div>
</div>
</div>
</main>
<!-- Footer Shell -->
<footer class="bg-transparent text-indigo-400 dark:text-indigo-500 font-['Plus_Jakarta_Sans'] text-xs uppercase tracking-[0.05em] fixed bottom-0 w-full flex flex-col md:flex-row justify-between items-center px-12 py-8 w-full">
<div class="opacity-80 hover:opacity-100 transition-opacity mb-4 md:mb-0">
            Sicheres Verwaltungssystem für Ferienbetreuung
        </div>
<div class="flex gap-8">
<a class="hover:text-indigo-700 dark:hover:text-indigo-200 transition-colors" href="#">Impressum</a>
<a class="hover:text-indigo-700 dark:hover:text-indigo-200 transition-colors" href="#">Datenschutz</a>
</div>
